name: Auto Update Version

on:
  push:
    branches:
      - main  # ตรวจสอบว่าใช้ชื่อ branch นี้จริงๆ (บางที่ใช้ master)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update Version in sw.js and index.php
        run: |
          # กำหนดรูปแบบเวอร์ชันใหม่ตามลำดับการรันของ GitHub
          VERSION="1.0.${{ github.run_number }}-G31L"
          
          # ใช้ sed ค้นหาและแทนที่ข้อความในรูปแบบ v1.0.xx-G31L
          # สำคัญ: ในไฟล์ sw.js และ index.php ของน้องต้องมีข้อความรูปแบบนี้อยู่ก่อนแล้ว 1 จุด
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]*-G31L/v$VERSION/g" sw.js
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]*-G31L/v$VERSION/g" index.php

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # ตรวจสอบว่ามีการเปลี่ยนแปลงไฟล์จากการ sed หรือไม่
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: auto-update version to 1.0.${{ github.run_number }}-G31L"
            git push
          else
            echo "Nothing to change, skipping commit."
          fi

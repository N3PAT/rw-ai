name: Auto Update Version

on:
  push:
    branches:
      - main  # ตรวจสอบชื่อ Branch ให้ตรงกับที่น้องใช้ (เช่น main หรือ master)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update Version in sw.js and index.php
        run: |
          # กำหนดรูปแบบเวอร์ชันใหม่
          VERSION="1.0.${{ github.run_number }}-G31L"
          
          # ใช้ sed ค้นหาแพทเทิร์น vX.X.XX-G31L แล้วแทนที่ด้วยเวอร์ชันปัจจุบัน
          # ตรวจสอบให้แน่ใจว่าในไฟล์ sw.js และ index.php มีข้อความรูปแบบนี้อยู่ก่อนแล้ว
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]*-G31L/v$VERSION/g" sw.js
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]*-G31L/v$VERSION/g" index.php

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # ตรวจสอบความเปลี่ยนแปลงใน Working Directory
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: auto-update version to 1.0.${{ github.run_number }}-G31L"
            git push
          else
            echo "Nothing to change, skipping commit."
          fi
